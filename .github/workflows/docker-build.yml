name: Docker build (frontends)

# Build-only smoke check for the two frontend container images. GitHub runners
# have Docker, so this verifies what the local dev env (no Docker) could not.
# No push / no registry — it just proves both Dockerfiles build cleanly.

on:
  pull_request:
    paths:
      - "frontend-next/**"
      - "frontend-react/**"
      - ".github/workflows/docker-build.yml"
  push:
    branches: [main]
    paths:
      - "frontend-next/**"
      - "frontend-react/**"
      - ".github/workflows/docker-build.yml"
  workflow_dispatch: {}

jobs:
  frontend-react:
    name: build frontend-react image (Vite → nginx, Bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # frontend-react/config.ts throws in a production build if VITE_API_BASE is
      # unset, so pass a dummy https value (the image is never run here).
      - name: docker build frontend-react
        run: docker build --build-arg VITE_API_BASE=https://example.com -t carmen-frontend-react:ci frontend-react

  frontend-next:
    name: build frontend-next image (Next standalone, Bun build / Node runtime)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # NEXT_PUBLIC_API_BASE / DOCKER_BUILD have defaults in the Dockerfile.
      - name: docker build frontend-next
        run: docker build -t carmen-frontend-next:ci frontend-next
