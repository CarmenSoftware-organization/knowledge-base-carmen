name: keepalive-backend

# Pings the Render free-tier backend so it doesn't spin down after ~15 min idle.
# A cold start makes the frontend homepage hang/blank while the backend wakes
# (Docker entrypoint: DB wait + migrate + clone on a 0.1 CPU instance).
#
# CAVEAT: GitHub scheduled crons are best-effort and can be delayed several
# minutes under load, so this is not a hard guarantee against spin-down. If the
# backend still sleeps, lower the interval to "*/5 * * * *" or use a dedicated
# uptime monitor (e.g. UptimeRobot / cron-job.org). The proper fix is upgrading
# the Render service to a paid always-on plan.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: keepalive-backend
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health (wake the backend if it is cold)
        run: |
          URL="https://carmen-backend-4o9h.onrender.com/health"
          for i in 1 2 3 4; do
            code=$(curl -sS -m 120 -o /dev/null -w '%{http_code}' "$URL" || echo 000)
            echo "attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then
              echo "backend is awake"
              exit 0
            fi
            sleep 20
          done
          # Do not fail the workflow on a miss — the next run will retry, and a
          # cold backend can take longer than this window to wake.
          echo "::warning::backend did not return 200 within the window (may still be waking)"
