name: Auto provision BU + sync + reindex

on:
  push:
    branches:
      - main
    paths:
      - "contents/**"
  workflow_dispatch:

jobs:
  sync-and-reindex:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed and removed BUs from contents/
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [[ -z "${BEFORE}" || "${BEFORE}" == "0000000000000000000000000000000000000000" ]]; then
            FILES="$(git ls-tree -r --name-only "${AFTER}" -- contents || true)"
            STATUSES=""
          else
            FILES="$(git diff --name-only "${BEFORE}" "${AFTER}" -- contents || true)"
            STATUSES="$(git diff --name-status "${BEFORE}" "${AFTER}" -- contents || true)"
          fi

          extract_bu() {
            local p="$1"
            # Supports:
            # - contents/<bu>/...
            # - contents/training_center/<bu>/...
            if [[ "$p" =~ ^contents/training_center/([^/]+)/ ]]; then
              echo "${BASH_REMATCH[1]}"
              return 0
            fi
            if [[ "$p" =~ ^contents/([^/]+)/ ]]; then
              local lvl1="${BASH_REMATCH[1]}"
              if [[ "$lvl1" != "training_center" ]]; then
                echo "${lvl1}"
                return 0
              fi
            fi
            return 1
          }

          BUS_CANDIDATES=""
          while IFS= read -r f; do
            [[ -z "$f" ]] && continue
            if bu="$(extract_bu "$f")"; then
              BUS_CANDIDATES="${BUS_CANDIDATES}"$'\n'"${bu}"
            fi
          done <<< "${FILES}"
          BUS_CANDIDATES="$(echo "${BUS_CANDIDATES}" | sed '/^$/d' | sort -u || true)"
          ACTIVE_BU=""
          for bu in ${BUS_CANDIDATES}; do
            if git ls-tree -r --name-only "${AFTER}" -- "contents/${bu}/" | grep -q . || \
               git ls-tree -r --name-only "${AFTER}" -- "contents/training_center/${bu}/" | grep -q .; then
              ACTIVE_BU="${ACTIVE_BU} ${bu}"
            fi
          done
          ACTIVE_BU="$(echo "${ACTIVE_BU}" | xargs || true)"

          REMOVED_CANDIDATES=""
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            status="$(echo "$line" | awk '{print $1}')"
            path1="$(echo "$line" | awk '{print $2}')"
            # handle rename records: R100 old new
            if [[ "$status" =~ ^R ]]; then
              if bu="$(extract_bu "$path1")"; then
                REMOVED_CANDIDATES="${REMOVED_CANDIDATES}"$'\n'"${bu}"
              fi
            elif [[ "$status" == "D" ]]; then
              if bu="$(extract_bu "$path1")"; then
                REMOVED_CANDIDATES="${REMOVED_CANDIDATES}"$'\n'"${bu}"
              fi
            fi
          done <<< "${STATUSES}"
          REMOVED_CANDIDATES="$(echo "${REMOVED_CANDIDATES}" | sed '/^$/d' | sort -u || true)"
          REMOVED_BU=""
          for bu in ${REMOVED_CANDIDATES}; do
            if ! git ls-tree -r --name-only "${AFTER}" -- "contents/${bu}/" | grep -q . && \
               ! git ls-tree -r --name-only "${AFTER}" -- "contents/training_center/${bu}/" | grep -q .; then
              REMOVED_BU="${REMOVED_BU} ${bu}"
            fi
          done
          REMOVED_BU="$(echo "${REMOVED_BU}" | xargs || true)"

          echo "changed_files<<EOF" >> "$GITHUB_OUTPUT"
          echo "${FILES}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "active_bus=${ACTIVE_BU}" >> "$GITHUB_OUTPUT"
          echo "removed_bus=${REMOVED_BU}" >> "$GITHUB_OUTPUT"

          if [[ -z "${ACTIVE_BU}" && -z "${REMOVED_BU}" ]]; then
            echo "No BU changes detected under contents/"
          else
            echo "Active BU(s): ${ACTIVE_BU}"
            echo "Removed BU(s): ${REMOVED_BU}"
          fi

      - name: Stop when no BU changed
        if: steps.detect.outputs.active_bus == '' && steps.detect.outputs.removed_bus == ''
        run: echo "No work to do."

      - name: Deprovision removed BUs
        if: steps.detect.outputs.removed_bus != ''
        env:
          API_BASE: ${{ secrets.BACKEND_BASE_URL }}
          ADMIN_KEY: ${{ secrets.BACKEND_ADMIN_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${API_BASE}" || -z "${ADMIN_KEY}" ]]; then
            echo "Missing BACKEND_BASE_URL or BACKEND_ADMIN_API_KEY secrets"
            exit 1
          fi
          for bu in ${{ steps.detect.outputs.removed_bus }}; do
            echo "Deprovisioning BU: ${bu}"
            curl -sS -f -X POST "${API_BASE}/api/business-units/deprovision" \
              -H "X-Admin-Key: ${ADMIN_KEY}" \
              -H "Content-Type: application/json" \
              --data "{\"slug\":\"${bu}\"}"
            echo
          done

      - name: Provision changed BUs
        if: steps.detect.outputs.active_bus != ''
        env:
          API_BASE: ${{ secrets.BACKEND_BASE_URL }}
          ADMIN_KEY: ${{ secrets.BACKEND_ADMIN_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${API_BASE}" || -z "${ADMIN_KEY}" ]]; then
            echo "Missing BACKEND_BASE_URL or BACKEND_ADMIN_API_KEY secrets"
            exit 1
          fi

          for bu in ${{ steps.detect.outputs.active_bus }}; do
            echo "Provisioning BU: ${bu}"
            curl -sS -f -X POST "${API_BASE}/api/business-units/provision" \
              -H "X-Admin-Key: ${ADMIN_KEY}" \
              -H "Content-Type: application/json" \
              --data "{\"slug\":\"${bu}\",\"name\":\"${bu^^}\",\"description\":\"Auto provisioned by GitHub Actions\"}"
            echo
          done

      - name: Sync wiki content
        if: steps.detect.outputs.active_bus != '' || steps.detect.outputs.removed_bus != ''
        env:
          API_BASE: ${{ secrets.BACKEND_BASE_URL }}
          ADMIN_KEY: ${{ secrets.BACKEND_ADMIN_API_KEY }}
        run: |
          set -euo pipefail
          curl -sS -f -X POST "${API_BASE}/api/wiki/sync" -H "X-Admin-Key: ${ADMIN_KEY}"

      - name: Reindex changed BUs
        if: steps.detect.outputs.active_bus != ''
        env:
          API_BASE: ${{ secrets.BACKEND_BASE_URL }}
          ADMIN_KEY: ${{ secrets.BACKEND_ADMIN_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          for bu in ${{ steps.detect.outputs.active_bus }}; do
            echo "Trigger reindex for: ${bu}"
            curl -sS -f -X POST "${API_BASE}/api/index/rebuild?bu=${bu}" -H "X-Admin-Key: ${ADMIN_KEY}"
            echo
          done
