basePath: /
definitions:
  models.ChatAskRequest:
    properties:
      preferredPath:
        type: string
      question:
        type: string
    type: object
  models.ChatAskResponse:
    properties:
      answer:
        type: string
      needDisambiguation:
        type: boolean
      options:
        items:
          $ref: '#/definitions/models.DisambiguationOption'
        type: array
      sources:
        items:
          $ref: '#/definitions/models.ChatSource'
        type: array
    type: object
  models.ChatSource:
    properties:
      articleId:
        type: string
      title:
        type: string
    type: object
  models.DisambiguationOption:
    properties:
      path:
        type: string
      reason:
        type: string
      score:
        type: number
      title:
        type: string
    type: object
  models.RecordHistoryRequest:
    properties:
      answer:
        type: string
      bu:
        type: string
      question:
        type: string
      sources:
        items:
          $ref: '#/definitions/models.ChatSource'
        type: array
      user_id:
        type: string
    type: object
  models.RouteCandidate:
    properties:
      path:
        type: string
      reason:
        type: string
      score:
        type: number
    type: object
  models.RouteResult:
    properties:
      candidates:
        items:
          $ref: '#/definitions/models.RouteCandidate'
        type: array
    type: object
info:
  contact: {}
  description: REST API for wiki, FAQ, native RAG chat, indexing, activity, and GitHub
    webhooks. Most routes accept optional `bu` query or `X-BU-Slug` header (default
    from server config).
  title: Knowledge base carmen API
  version: "1.0"
paths:
  /api/activity/list:
    get:
      description: Returns the activity log entries for the business unit.
      parameters:
      - default: carmen
        description: Business unit slug
        in: query
        name: bu
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Activity log list
      tags:
      - activity
  /api/activity/summary:
    get:
      description: Returns aggregated activity statistics for the business unit.
      parameters:
      - default: carmen
        description: Business unit slug
        in: query
        name: bu
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Activity summary
      tags:
      - activity
  /api/business-units:
    get:
      description: Lists the business units (tenants) available for the BU selector,
        excluding internal auto-provision entries.
      parameters:
      - default: carmen
        description: Business unit slug
        in: query
        name: bu
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: List business units
      tags:
      - wiki
  /api/chat/ask:
    post:
      consumes:
      - application/json
      description: 'Non-streaming RAG chat: retrieves relevant chunks and returns
        a grounded answer with its sources. Returns a "no information found" message
        when nothing matches.'
      parameters:
      - default: carmen
        description: Business unit slug
        in: query
        name: bu
        type: string
      - description: Question
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.ChatAskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ChatAskResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Ask the knowledge-base chat (Go path)
      tags:
      - chat
  /api/chat/clear/{room_id}:
    delete:
      description: Acknowledges a request to clear a chat room. No-op server-side
        — chat history is owned by the frontend.
      responses: {}
      summary: Clear room history (no-op ack; history is frontend-owned)
      tags:
      - chat
  /api/chat/feedback/{message_id}:
    post:
      description: Records a thumbs up/down score for a chat message, scoped to the
        requesting user.
      responses: {}
      summary: Message feedback (thumbs up/down)
      tags:
      - chat
  /api/chat/history/list:
    get:
      description: Returns recent chat history rows, optionally filtered by business
        unit. Requires the X-Admin-Key header.
      parameters:
      - description: Filter by BU
        in: query
        name: bu
        type: string
      - default: 50
        description: Max rows
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - AdminKey: []
      summary: List chat history (admin)
      tags:
      - chat
  /api/chat/record-history:
    post:
      consumes:
      - application/json
      description: Persists a chat turn (question, answer, sources) to history. Internal-only;
        requires the X-Internal-API-Key header.
      parameters:
      - description: History row
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.RecordHistoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - InternalKey: []
      summary: Record chat turn (internal)
      tags:
      - chat
  /api/chat/route-test:
    post:
      consumes:
      - application/json
      description: Debug endpoint that returns only the intent-router decision for
        a question, without generating an answer. Requires the X-Admin-Key header.
      parameters:
      - default: carmen
        description: Business unit slug
        in: query
        name: bu
        type: string
      - description: Question
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.ChatAskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.RouteResult'
      security:
      - AdminKey: []
      summary: Route-only debug (admin)
      tags:
      - chat
  /api/chat/stream:
    post:
      description: 'Streaming RAG chat over NDJSON: emits status, sources, answer
        chunks, suggestions, and a final done event. This is the primary endpoint
        used by the frontend.'
      responses: {}
      summary: Stream chat (native NDJSON RAG)
      tags:
      - chat
  /api/documents:
    get:
      description: Lists the documents currently indexed in the database for the business
        unit.
      parameters:
      - default: carmen
        description: Business unit slug
        in: query
        name: bu
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: List indexed documents
      tags:
      - documents
  /api/faq/{module}:
    get:
      description: Returns the detail (sub-modules and entries) for the given FAQ
        module.
      parameters:
      - description: Module key
        in: path
        name: module
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: FAQ module detail
      tags:
      - faq
  /api/faq/{module}/{sub}/{category}:
    get:
      description: Lists FAQ entries under the given module / sub-module / category
        path.
      parameters:
      - description: Module key
        in: path
        name: module
        required: true
        type: string
      - description: Sub-module
        in: path
        name: sub
        required: true
        type: string
      - description: Category
        in: path
        name: category
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: FAQ by category
      tags:
      - faq
  /api/faq/entry/{id}:
    get:
      description: Returns a single FAQ entry by its id.
      parameters:
      - description: Entry id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: FAQ entry by id
      tags:
      - faq
  /api/faq/modules:
    get:
      description: Lists the available FAQ modules.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: FAQ module list
      tags:
      - faq
  /api/index/rebuild:
    post:
      consumes:
      - application/json
      description: Starts an asynchronous rebuild of the pgvector + full-text search
        index for the business unit. Requires the X-Admin-Key header.
      parameters:
      - description: Business unit slug
        in: query
        name: bu
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - AdminKey: []
      summary: Rebuild search index (admin)
      tags:
      - indexing
  /api/system/status:
    get:
      description: Reports overall service status, including database connectivity
        and basic runtime info.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: System status
      tags:
      - system
  /api/wiki/categories:
    get:
      description: Returns the top-level wiki categories (sidebar sections) for the
        business unit.
      parameters:
      - default: carmen
        description: Business unit slug
        in: query
        name: bu
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: List wiki categories
      tags:
      - wiki
  /api/wiki/category/{slug}:
    get:
      description: Returns the articles contained in the given category slug for the
        business unit.
      parameters:
      - description: Category slug
        in: path
        name: slug
        required: true
        type: string
      - default: carmen
        description: Business unit slug
        in: query
        name: bu
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Wiki category detail
      tags:
      - wiki
  /api/wiki/content/{path}:
    get:
      description: Returns the raw markdown body for the article at the given path
        under the wiki root.
      parameters:
      - description: Path under wiki root
        in: path
        name: path
        required: true
        type: string
      - default: carmen
        description: Business unit slug
        in: query
        name: bu
        type: string
      produces:
      - text/plain
      responses:
        "200":
          description: Markdown body
          schema:
            type: string
      summary: Wiki markdown content
      tags:
      - wiki
  /api/wiki/list:
    get:
      description: Returns all indexed wiki/markdown articles for the business unit
        with their metadata (title, path, tags, dates).
      parameters:
      - default: carmen
        description: Business unit slug
        in: query
        name: bu
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: List wiki articles
      tags:
      - wiki
  /api/wiki/search:
    get:
      description: Hybrid full-text + pgvector search over the business unit's wiki
        content; returns ranked matches.
      parameters:
      - description: Search query
        in: query
        name: q
        required: true
        type: string
      - default: carmen
        description: Business unit slug
        in: query
        name: bu
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Full-text / vector wiki search
      tags:
      - wiki
  /api/wiki/sync:
    post:
      consumes:
      - application/json
      description: Clones or pulls the content Git repo and refreshes the wiki on
        disk. Requires the X-Admin-Key header.
      parameters:
      - default: carmen
        description: Business unit slug
        in: query
        name: bu
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - AdminKey: []
      summary: Sync wiki from Git (admin)
      tags:
      - wiki
  /health:
    get:
      description: Lightweight liveness probe; returns {"status":"ok"} without touching
        the database.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - system
  /images/{path}:
    get:
      description: Serves an image referenced by chat answers or wiki content, resolved
        under the business unit's content.
      parameters:
      - description: Image path
        in: path
        name: path
        required: true
        type: string
      - default: carmen
        description: Business unit slug
        in: query
        name: bu
        type: string
      produces:
      - application/octet-stream
      responses: {}
      summary: Chat / wiki image
      tags:
      - chat
  /webhook/github:
    post:
      consumes:
      - application/json
      description: Receives GitHub push events and triggers a content sync + reindex
        for the affected business units.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: GitHub push webhook
      tags:
      - webhooks
  /wiki-assets/{path}:
    get:
      description: Serves a static wiki asset (image or file) referenced by markdown,
        resolved under the business unit's content.
      parameters:
      - description: Asset path
        in: path
        name: path
        required: true
        type: string
      - default: carmen
        description: Business unit slug
        in: query
        name: bu
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
      summary: Static wiki asset
      tags:
      - wiki
swagger: "2.0"
