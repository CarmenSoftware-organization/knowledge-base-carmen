info:
  contact: {}
  description: REST API for wiki, FAQ, native RAG chat, indexing, activity, and GitHub
    webhooks. Most routes accept optional `bu` query or `X-BU-Slug` header (default
    from server config).
  title: Knowledge base carmen API
  version: "1.0"
paths:
  /api/activity/list:
    get:
      description: Returns the activity log entries for the business unit.
      parameters:
      - default: carmen
        description: Business unit slug
        in: query
        name: bu
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apidoc.SwagActivityLogListEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apidoc.SwagErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apidoc.SwagErrorResponse'
      summary: Activity log list
      tags:
      - activity
  /api/activity/summary:
    get:
      description: Returns aggregated activity statistics for the business unit.
      parameters:
      - default: carmen
        description: Business unit slug
        in: query
        name: bu
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apidoc.SwagActivitySummaryEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apidoc.SwagErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apidoc.SwagErrorResponse'
      summary: Activity summary
      tags:
      - activity
  /api/business-units:
    get:
      description: Lists the business units (tenants) available for the BU selector,
        excluding internal auto-provision entries.
      parameters:
      - default: carmen
        description: Business unit slug
        in: query
        name: bu
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apidoc.SwagBusinessUnitsEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apidoc.SwagErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apidoc.SwagErrorResponse'
      summary: List business units
      tags:
      - wiki
  /api/business-units/deprovision:
    delete:
      consumes:
      - application/json
      description: Removes a business unit and all its data. Requires the X-Admin-Key
        header.
      parameters:
      - description: Business unit slug
        in: query
        name: bu
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apidoc.SwagDeprovisionResultEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apidoc.SwagErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apidoc.SwagErrorResponse'
      security:
      - AdminKey: []
      summary: Deprovision a business unit (admin)
      tags:
      - wiki
  /api/business-units/provision:
    post:
      consumes:
      - application/json
      description: Creates and provisions a new business unit. Requires the X-Admin-Key
        header.
      parameters:
      - description: Business unit slug
        in: query
        name: bu
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apidoc.SwagProvisionResultEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apidoc.SwagErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apidoc.SwagErrorResponse'
      security:
      - AdminKey: []
      summary: Provision a business unit (admin)
      tags:
      - wiki
  /api/chat/ask:
    post:
      consumes:
      - application/json
      description: 'Non-streaming RAG chat: retrieves relevant chunks and returns
        a grounded answer with its sources. Returns a "no information found" message
        when nothing matches.'
      parameters:
      - default: carmen
        description: Business unit slug
        in: query
        name: bu
        type: string
      - description: Question
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.ChatAskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apidoc.SwagChatAskResponseEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apidoc.SwagErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apidoc.SwagErrorResponse'
      summary: Ask the knowledge-base chat (Go path)
      tags:
      - chat
  /api/chat/clear/{room_id}:
    delete:
      description: Acknowledges a request to clear a chat room. No-op server-side
        — chat history is owned by the frontend.
      parameters:
      - description: Room ID
        in: path
        name: room_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apidoc.SwagClearResultEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apidoc.SwagErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apidoc.SwagErrorResponse'
      summary: Clear room history (no-op ack; history is frontend-owned)
      tags:
      - chat
  /api/chat/feedback/{message_id}:
    post:
      consumes:
      - application/json
      description: Records a thumbs up/down score for a chat message, scoped to the
        requesting user.
      parameters:
      - description: Message UUID
        in: path
        name: message_id
        required: true
        type: string
      - default: carmen
        description: Business unit slug
        in: query
        name: bu
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/apidoc.SwagStatusResultEnvelope'
        "400":
          description: Bad Request
          schema:
