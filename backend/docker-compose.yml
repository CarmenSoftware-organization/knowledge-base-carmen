# New Carmen — backend-only stack (Go API; connects to an EXTERNAL Postgres+pgvector)
# This compose lives in backend/ — run the commands below from the backend/ dir.
# Usage:
#   cd backend
#   cp docker-compose.env.example .env.docker
#   # edit .env.docker — set DB_* (external Postgres) + secrets (JWT, OPENROUTER_API_KEY, GITHUB_TOKEN, …)
#   docker compose --env-file .env.docker up --build
#
# DB: this compose no longer runs a Postgres container. Point the backend at an
# external Postgres+pgvector via DB_* in .env.docker (remote dev DB, host PG, …).
#
# Migrations: apply them to that external DB with `./scripts/migrate-docker.sh`
#   (run from repo root; reads backend/.env.docker). See backend/migrations/README.md
#   for order + dimension variants.
#
# Health: GET http://<host>:8080/health (Go backend serves /api/chat/* natively)
#
# Stack: backend only (Go, native RAG chatbot at /api/chat/*)
# Frontend ไม่อยู่ใน compose แล้ว — รัน local ด้วย `cd frontend-next && npm run dev`, deploy → Vercel

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      ENVIRONMENT: ${ENVIRONMENT:-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      # External Postgres+pgvector — set these in .env.docker
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-carmen_db}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      DB_SCHEMA: ${DB_SCHEMA:-carmen,public}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      # Repo root is mounted at /repo (see volumes below). The backend resolves
      # wiki content per-BU to /repo/contents/<bu> automatically from GIT_REPO_PATH.
      GIT_REPO_PATH: ${GIT_REPO_PATH:-/repo}
      GITHUB_REPO_OWNER: ${GITHUB_REPO_OWNER:-Sunshine050}
      GITHUB_REPO_NAME: ${GITHUB_REPO_NAME:-new-carmen}
      GITHUB_BRANCH: ${GITHUB_BRANCH:-main}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_EMBED_MODEL: ${OPENROUTER_EMBED_MODEL:-qwen/qwen3-embedding-8b}
      GOOGLE_TRANSLATE_API_KEY: ${GOOGLE_TRANSLATE_API_KEY:-}
      TRANSLATION_ENABLED: ${TRANSLATION_ENABLED:-false}
      # Native chatbot LLM config (was the Python carmen-chatbot service)
      LLM_API_KEY: ${OPENROUTER_API_KEY:-}
      LLM_API_BASE: ${LLM_API_BASE:-https://openrouter.ai/api/v1}
      LLM_CHAT_MODEL: ${LLM_CHAT_MODEL:-stepfun/step-3.5-flash:free}
      LLM_INTENT_MODEL: ${LLM_INTENT_MODEL:-google/gemini-2.5-flash-lite}
      VECTOR_DIMENSION: ${VECTOR_DIMENSION:-2000}
      PRIVACY_HMAC_SECRET: ${PRIVACY_HMAC_SECRET:-carmen-docker-dev-privacy-secret-min-32-chars-required}
    volumes:
      # Repo mount: wiki markdown + carmen_cloud + .git for sync (needs write for git pull).
      # compose lives in backend/, so .. = repo root.
      - ..:/repo
    # Resolve host.docker.internal on Linux too (no-op on Mac/Windows)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s
