# render.yaml — Full Docker deployment on Render
#
# Services:
#   carmen-backend   -> Docker (Go Fiber; serves the native RAG chatbot at /api/chat/*)
# Frontend deploy แยกที่ Vercel (native Next.js build) — ไม่อยู่ใน blueprint นี้
#
# First-time setup:
# 1) Push this file to Git provider and create Blueprint on Render
# 2) Fill secrets marked with sync: false
# 3) Deploy
#
# Notes:
# - this blueprint is free-tier oriented (no Render managed Postgres)
# - use external Postgres by filling DB_* vars on backend/chatbot
# - backend startup runs idempotent migrate before starting server

services:
  # ─── Backend (Go Fiber in Docker) ───────────────────────────────────────────
  - type: web
    name: carmen-backend
    runtime: docker
    plan: free
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: "8080"

      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "6432"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: DB_SCHEMA
        value: carmen,public
      - key: VECTOR_DIMENSION
        value: "2000"

      # Wiki / Git
      - key: GIT_REPO_PATH
        value: /opt/render/project/src
      - key: WIKI_CONTENT_PATH
        value: /opt/render/project/src/carmen_cloud
      - key: GITHUB_REPO_OWNER
        value: CarmenSoftware-organization
      - key: GITHUB_REPO_NAME
        value: knowledge-base-carmen
      - key: GITHUB_BRANCH
        value: main
      - key: GITHUB_TOKEN
        sync: false

      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_EMBED_MODEL
        value: qwen/qwen3-embedding-8b

      # Native chatbot LLM config (was the Python carmen-chatbot service)
      - key: LLM_API_KEY
        sync: false
      - key: LLM_API_BASE
        value: https://openrouter.ai/api/v1
      - key: LLM_CHAT_MODEL
        value: stepfun/step-3.5-flash:free
      - key: LLM_INTENT_MODEL
        value: google/gemini-2.5-flash-lite

      - key: TRANSLATION_ENABLED
        value: "false"
      - key: GOOGLE_TRANSLATE_API_KEY
        sync: false

      - key: JWT_SECRET
        sync: false
      - key: PRIVACY_HMAC_SECRET
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: INTERNAL_API_KEY
        sync: false

      - key: CORS_ORIGINS
        value: "https://knowledge-base-carmen.vercel.app"

