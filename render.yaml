# render.yaml — Full Docker deployment on Render
#
# Services:
#   carmen-backend   -> Docker (Go Fiber)
#   carmen-chatbot   -> Docker (Python FastAPI)
#   carmen-frontend  -> Docker (Next.js)
#
# First-time setup:
# 1) Push this file to Git provider and create Blueprint on Render
# 2) Fill secrets marked with sync: false
# 3) Deploy
#
# Notes:
# - this blueprint is free-tier oriented (no Render managed Postgres)
# - use external Postgres by filling DB_* vars on backend/chatbot
# - backend startup runs idempotent migrate before starting server

services:
  # ─── Backend (Go Fiber in Docker) ───────────────────────────────────────────
  - type: web
    name: carmen-backend
    runtime: docker
    plan: free
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: "8080"

      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "6432"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: DB_SCHEMA
        value: carmen,public
      - key: VECTOR_DIMENSION
        value: "2000"

      # Wiki / Git
      - key: GIT_REPO_PATH
        value: /opt/render/project/src
      - key: WIKI_CONTENT_PATH
        value: /opt/render/project/src/carmen_cloud
      - key: GITHUB_REPO_OWNER
        value: CarmenSoftware-organization
      - key: GITHUB_REPO_NAME
        value: kb-carmen
      - key: GITHUB_BRANCH
        value: main
      - key: GITHUB_TOKEN
        sync: false

      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_EMBED_MODEL
        value: qwen/qwen3-embedding-8b

      - key: TRANSLATION_ENABLED
        value: "false"
      - key: GOOGLE_TRANSLATE_API_KEY
        sync: false

      - key: JWT_SECRET
        sync: false
      - key: PRIVACY_HMAC_SECRET
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: INTERNAL_API_KEY
        sync: false

      - key: CORS_ORIGINS
        value: "*"

      - key: PYTHON_CHATBOT_URL
        fromService:
          type: web
          name: carmen-chatbot
          envVarKey: RENDER_EXTERNAL_URL

  # ─── Chatbot (FastAPI in Docker) ───────────────────────────────────────────
  - type: web
    name: carmen-chatbot
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./carmen-chatbot/Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: "8000"
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "6432"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: DB_SCHEMA
        value: carmen,public
      - key: VECTOR_DIMENSION
        value: "2000"
      - key: WIKI_CONTENT_PATH
        value: /app/carmen_cloud
      - key: LLM_API_BASE
        value: https://openrouter.ai/api/v1
      - key: LLM_CHAT_MODEL
        value: stepfun/step-3.5-flash:free
      - key: LLM_INTENT_MODEL
        value: google/gemini-2.5-flash-lite
      - key: LLM_EMBED_MODEL
        value: qwen/qwen3-embedding-8b
      - key: LLM_API_KEY
        sync: false
      - key: PRIVACY_HMAC_SECRET
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      - key: GO_BACKEND_URL
        fromService:
          type: web
          name: carmen-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: GO_BACKEND_INTERNAL_API_KEY
        sync: false

  # ─── Frontend (Next.js in Docker) ──────────────────────────────────────────
  - type: web
    name: carmen-frontend
    runtime: docker
    plan: free
    dockerContext: ./frontend/user
    dockerfilePath: ./frontend/user/Dockerfile
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_BASE
        fromService:
          type: web
          name: carmen-backend
          envVarKey: RENDER_EXTERNAL_URL
