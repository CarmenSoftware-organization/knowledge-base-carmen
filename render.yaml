# render.yaml — Backend deployment on Render (Docker)
#
# Service:
#   carmen-backend -> Docker (Go Fiber API; serves the native RAG chatbot at
#                     /api/chat/* and Swagger UI at /swagger/index.html)
# Frontend deploys separately on Vercel (native Next.js build) — not in this blueprint.
#
# First-time setup:
# 1) Push this file to the Git provider and create a Blueprint on Render
# 2) Fill the secrets marked with `sync: false`
# 3) Deploy
#
# Notes:
# - Free-tier oriented (no Render-managed Postgres) — point at an EXTERNAL
#   Postgres+pgvector by filling the DB_* vars below.
# - On boot the Docker entrypoint waits for the DB, then applies
#   migrations/0001_init_schema.sql (idempotent) before starting ./server.
# - All tenant data lives in the `public` schema, partitioned by bu_id (no
#   schema-per-BU), so DB_SCHEMA is just `public`.

services:
  # ─── Backend (Go Fiber in Docker) ───────────────────────────────────────────
  - type: web
    name: carmen-backend
    runtime: docker
    plan: free
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: "8080"

      # Database (external Postgres + pgvector) — fill host/user/password/name
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "6432"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: DB_SCHEMA
        value: public
      - key: VECTOR_DIMENSION
        value: "2000"

      # Wiki / Git
      - key: GIT_REPO_PATH
        value: /opt/render/project/src
      - key: WIKI_CONTENT_PATH
        value: /opt/render/project/src/carmen_cloud
      - key: GITHUB_REPO_OWNER
        value: CarmenSoftware-organization
      - key: GITHUB_REPO_NAME
        value: knowledge-base-carmen
      - key: GITHUB_BRANCH
        value: main
      - key: GITHUB_TOKEN
        sync: false

      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_EMBED_MODEL
        value: qwen/qwen3-embedding-8b

      # Native RAG chatbot LLM config (intent → hybrid retrieval → LLM)
      - key: LLM_API_KEY
        sync: false
      - key: LLM_API_BASE
        value: https://openrouter.ai/api/v1
      - key: LLM_CHAT_MODEL
        value: stepfun/step-3.5-flash:free
      - key: LLM_INTENT_MODEL
        value: google/gemini-2.5-flash-lite

      - key: TRANSLATION_ENABLED
        value: "false"
      - key: GOOGLE_TRANSLATE_API_KEY
        sync: false

      - key: JWT_SECRET
        sync: false
      - key: PRIVACY_HMAC_SECRET
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: INTERNAL_API_KEY
        sync: false

      - key: CORS_ORIGINS
        value: "https://knowledge-base-carmen.vercel.app"

      # HTML→PDF sidecar — wired automatically to the private gotenberg service's
      # internal host:port (no public URL, no manual placeholder to fill).
      # fromService returns "host:port" (no scheme); the backend prepends http://
      # (see config.go: GOTENBERG_URL is normalized to an http:// URL).
      - key: GOTENBERG_URL
        fromService:
          type: pserv
          name: gotenberg
          property: hostport

  # ─── Gotenberg (HTML→PDF via Chromium) — used by /api/export/pdf ─────────────
  # PRIVATE service: no public URL — only reachable over Render's internal network
  # by carmen-backend. It renders client-supplied HTML, so it must NOT be public.
  # NOTE: pserv has no free plan (min = starter, paid). Keep it in the same region
  # as carmen-backend for private networking.
  - type: pserv
    name: gotenberg
    runtime: image
    image:
      url: gotenberg/gotenberg:8
    plan: starter
    # Defense-in-depth: --chromium-deny-list blocks Chromium's OUTBOUND http(s)
    # loads (we already inline images server-side, so none are needed). For an
    # `runtime: image` service the container command is overridden via dockerCommand.
    # verify flag vs Gotenberg 8 docs — https://gotenberg.dev/docs/configuration
    dockerCommand: "gotenberg --chromium-deny-list=^https?://"
