worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Rate Limiting Zone setup
    # Allow 10 requests per second per IP address
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    server {
        listen 80;
        server_name localhost; # Change to your actual domain

        # Basic Security Headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";

        # Forward API requests to the Python FastAPI backend
        location /api/ {
            # Apply rate limiting: burst 20 allows handling sudden bursts up to 20 without rejecting immediately
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Settings essential for Server-Sent Events (SSE) streaming chat
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
        }

        # Serve frontend and static assets if needed
        # location / {
        #     root /usr/share/nginx/html;
        #     index index.html index.htm;
        # }
    }
}
